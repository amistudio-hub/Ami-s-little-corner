<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Ami's Little Corner - My Books</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,600;7..72,700&family=Inter:wght@400;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#fef7ff",
            "surface": "#fef7ff",
            "surface-bright": "#fef7ff",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f9f0ff",
            "surface-container": "#f4eafd",
            "surface-container-high": "#eee4f8",
            "surface-container-highest": "#e9dff2",
            "surface-variant": "#e9dff2",
            "surface-dim": "#e0d6e9",
            "on-surface": "#1e1927",
            "on-surface-variant": "#494453",
            "on-background": "#1e1927",
            "primary": "#461599",
            "on-primary": "#ffffff",
            "primary-container": "#5e35b1",
            "on-primary-container": "#ceb8ff",
            "primary-fixed": "#eaddff",
            "primary-fixed-dim": "#d1bcff",
            "on-primary-fixed": "#24005b",
            "on-primary-fixed-variant": "#5429a7",
            "secondary": "#6d4ea2",
            "on-secondary": "#ffffff",
            "secondary-container": "#c5a3ff",
            "on-secondary-container": "#533487",
            "secondary-fixed": "#ebdcff",
            "secondary-fixed-dim": "#d4bbff",
            "on-secondary-fixed": "#270058",
            "on-secondary-fixed-variant": "#543589",
            "outline": "#7b7484",
            "outline-variant": "#cbc3d5",
            "inverse-surface": "#332e3c",
            "inverse-on-surface": "#f7edff",
            "inverse-primary": "#d1bcff",
            "surface-tint": "#6c45c0",
            "error": "#ba1a1a",
            "on-error": "#ffffff",
            "error-container": "#ffdad6",
            "on-error-container": "#93000a",
            "tertiary": "#5a2f00",
            "on-tertiary": "#ffffff",
            "tertiary-container": "#7b4200",
            "on-tertiary-container": "#ffb371",
            "tertiary-fixed": "#ffdcc2",
            "tertiary-fixed-dim": "#ffb77a",
            "on-tertiary-fixed": "#2e1500",
            "on-tertiary-fixed-variant": "#6d3a00",
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          spacing: {
            "stack-lg": "20px",
            "container-padding": "24px",
            "stack-md": "12px",
            "section-gap": "64px",
            "gutter": "16px",
            "base": "8px",
            "stack-sm": "4px"
          },
          fontFamily: {
            "headline-lg-mobile": ["Literata"],
            "body-lg": ["Inter"],
            "headline-xl": ["Literata"],
            "headline-lg": ["Literata"],
            "headline-md": ["Literata"],
            "body-md": ["Inter"],
            "label-sm": ["Inter"]
          },
          fontSize: {
            "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "600"}],
            "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
            "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
            "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
            "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}]
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #f5f0fc; color: #1e1927; }
    .editorial-card {
      box-shadow: 0 4px 20px -4px rgba(70, 21, 153, 0.04);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .editorial-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -8px rgba(70, 21, 153, 0.08);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-family: 'Material Symbols Outlined';
      font-style: normal;
      vertical-align: middle;
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #7b7484;
      font-style: italic;
    }
  </style>
</head>
<body class="font-body-md text-body-md selection:bg-primary-fixed selection:text-on-primary-fixed">

  <!-- Top Navigation Bar -->
  <header class="w-full h-20 bg-background flex justify-between items-center max-w-[1200px] mx-auto px-container-padding sticky top-0 z-50">
    <div class="font-headline-md text-headline-md font-bold text-primary">Ami's Little Corner</div>
    <nav class="hidden md:flex items-center gap-gutter">
      <a class="text-primary font-bold border-b-2 border-primary pb-1 hover:text-primary transition-colors duration-200 cursor-pointer" href="index.html">Books</a>
      <a class="text-on-surface-variant font-medium pb-1 hover:text-primary transition-colors duration-200 cursor-pointer" href="series.html">Series</a>
      <a class="text-on-surface-variant font-medium pb-1 hover:text-primary transition-colors duration-200 cursor-pointer" href="schedule.html">Schedule</a>
    </nav>
    <div class="flex items-center gap-stack-md">
      <button class="p-2 rounded-full hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined text-on-surface-variant">search</span>
      </button>
      <button class="p-2 rounded-full hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined text-primary">account_circle</span>
      </button>
    </div>
  </header>

  <main class="max-w-[1200px] mx-auto px-container-padding py-section-gap">

    <!-- Log a New Book Section -->
    <section class="mb-section-gap">
      <div class="flex flex-col gap-stack-lg">
        <h2 class="font-headline-lg text-headline-lg text-on-background">Reading Log</h2>
        <div class="bg-surface-container-lowest p-stack-lg rounded-xl editorial-card border border-outline-variant/30">
          <div class="flex flex-col md:flex-row gap-gutter">

            <!-- Cover Upload -->
            <label class="w-full md:w-48 h-64 bg-surface-container-low rounded-lg border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-stack-sm cursor-pointer hover:bg-surface-container transition-colors group" id="cover-label">
              <img id="cover-preview" src="" alt="cover preview" class="hidden w-full h-full object-cover rounded-lg"/>
              <span class="material-symbols-outlined text-outline group-hover:text-primary" id="cover-icon">add_photo_alternate</span>
              <span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-primary" id="cover-text">+ Add Cover</span>
              <input type="file" accept="image/*" id="cover-input" class="hidden"/>
            </label>

            <!-- Form Fields -->
            <div class="flex-1 flex flex-col gap-gutter">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
                <div class="flex flex-col gap-stack-sm">
                  <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Book Title</label>
                  <input id="input-title" class="bg-white border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all font-body-md" placeholder="e.g. The Night Circus" type="text"/>
                </div>
                <div class="flex flex-col gap-stack-sm">
                  <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Author</label>
                  <input id="input-author" class="bg-white border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all font-body-md" placeholder="e.g. Erin Morgenstern" type="text"/>
                </div>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
                <div class="flex flex-col gap-stack-sm">
                  <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Genre</label>
                  <input id="input-genre" class="bg-white border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all font-body-md" placeholder="e.g. Fantasy" type="text"/>
                </div>
                <div class="flex flex-col gap-stack-sm">
                  <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Status</label>
                  <select id="input-status" class="bg-white border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all font-body-md">
                    <option value="Reading Now">Reading Now</option>
                    <option value="Completed">Completed</option>
                    <option value="Want to Read">Want to Read</option>
                    <option value="On Hold">On Hold</option>
                  </select>
                </div>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
                <div class="flex flex-col gap-stack-sm">
                  <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Rating (1–5)</label>
                  <input id="input-rating" class="bg-white border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all font-body-md" placeholder="e.g. 4.5" type="number" min="1" max="5" step="0.1"/>
                </div>
                <div class="flex flex-col gap-stack-sm">
                  <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Date</label>
                  <input id="input-date" class="bg-white border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all font-body-md" type="date"/>
                </div>
              </div>

              <div class="flex flex-col gap-stack-sm">
                <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Thoughts or Annotations</label>
                <textarea id="input-notes" class="bg-white border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all font-body-md resize-none" placeholder="What resonated with you?" rows="3"></textarea>
              </div>

              <div class="flex justify-end">
                <button id="log-btn" class="bg-primary text-on-primary px-8 py-3 rounded-full font-label-sm hover:opacity-90 transition-opacity active:scale-[0.98]">
                  Log Book Entry
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Book Shelf / Grid -->
    <section>
      <div class="flex items-center justify-between mb-gutter">
        <h3 class="font-headline-md text-headline-md text-on-background">My Shelf</h3>
        <!-- Filter Pills -->
        <div class="flex gap-stack-sm flex-wrap">
          <button onclick="filterBooks('all')" class="filter-btn active-filter px-4 py-1 rounded-full text-label-sm border border-primary text-primary font-semibold transition-all" data-filter="all">All</button>
          <button onclick="filterBooks('Reading Now')" class="filter-btn px-4 py-1 rounded-full text-label-sm border border-outline-variant text-on-surface-variant hover:border-primary hover:text-primary transition-all" data-filter="Reading Now">Reading</button>
          <button onclick="filterBooks('Completed')" class="filter-btn px-4 py-1 rounded-full text-label-sm border border-outline-variant text-on-surface-variant hover:border-primary hover:text-primary transition-all" data-filter="Completed">Completed</button>
          <button onclick="filterBooks('Want to Read')" class="filter-btn px-4 py-1 rounded-full text-label-sm border border-outline-variant text-on-surface-variant hover:border-primary hover:text-primary transition-all" data-filter="Want to Read">Want to Read</button>
        </div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <p style="font-size:2rem;">📚</p>
        <p class="mt-2">No books yet — add your first one above!</p>
      </div>

      <!-- Books Grid -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-gutter" id="books-grid"></div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="w-full py-section-gap bg-surface-container-low flex flex-col items-center justify-center gap-stack-md px-container-padding">
    <div class="font-headline-md text-headline-md text-primary font-bold">Ami's Little Corner</div>
    <nav class="flex gap-gutter">
      <a class="text-on-surface-variant hover:text-primary underline transition-all font-body-md" href="index.html">Books</a>
      <a class="text-on-surface-variant hover:text-primary underline transition-all font-body-md" href="series.html">Series</a>
      <a class="text-on-surface-variant hover:text-primary underline transition-all font-body-md" href="schedule.html">Schedule</a>
    </nav>
    <p class="font-body-md text-body-md text-on-surface-variant">© 2025 Ami's Little Corner. Keep tracking your joy. 💜</p>
  </footer>

  <!-- Mobile Bottom Nav -->
  <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-surface-variant h-16 flex justify-around items-center px-4 z-50">
    <a href="index.html" class="flex flex-col items-center text-primary font-bold">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">auto_stories</span>
      <span class="text-[10px]">Books</span>
    </a>
    <a href="series.html" class="flex flex-col items-center text-on-surface-variant">
      <span class="material-symbols-outlined">movie</span>
      <span class="text-[10px]">Series</span>
    </a>
    <a href="schedule.html" class="flex flex-col items-center text-on-surface-variant">
      <span class="material-symbols-outlined">calendar_today</span>
      <span class="text-[10px]">Schedule</span>
    </a>
  </div>

  <script>
    // ── DATA ──────────────────────────────────────────────
    let books = JSON.parse(localStorage.getItem('ami-books') || '[]');
    let currentFilter = 'all';

    // ── COVER UPLOAD ──────────────────────────────────────
    document.getElementById('cover-input').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        const preview = document.getElementById('cover-preview');
        preview.src = e.target.result;
        preview.classList.remove('hidden');
        document.getElementById('cover-icon').classList.add('hidden');
        document.getElementById('cover-text').classList.add('hidden');
      };
      reader.readAsDataURL(file);
    });

    // ── ADD BOOK ──────────────────────────────────────────
    document.getElementById('log-btn').addEventListener('click', function () {
      const title = document.getElementById('input-title').value.trim();
      const author = document.getElementById('input-author').value.trim();
      const genre = document.getElementById('input-genre').value.trim();
      const status = document.getElementById('input-status').value;
      const rating = document.getElementById('input-rating').value;
      const date = document.getElementById('input-date').value;
      const notes = document.getElementById('input-notes').value.trim();
      const preview = document.getElementById('cover-preview');
      const hasCover = !preview.classList.contains('hidden');
      const coverSrc = hasCover ? preview.src : '';

      if (!title) { alert('Please enter a book title!'); return; }

      const book = { id: Date.now(), title, author, genre, status, rating, date, notes, coverSrc };
      books.unshift(book);
      localStorage.setItem('ami-books', JSON.stringify(books));

      resetForm();
      renderBooks();
    });

    // ── RESET FORM ────────────────────────────────────────
    function resetForm() {
      document.getElementById('input-title').value = '';
      document.getElementById('input-author').value = '';
      document.getElementById('input-genre').value = '';
      document.getElementById('input-rating').value = '';
      document.getElementById('input-date').value = '';
      document.getElementById('input-notes').value = '';
      document.getElementById('input-status').value = 'Reading Now';
      const preview = document.getElementById('cover-preview');
      preview.src = '';
      preview.classList.add('hidden');
      document.getElementById('cover-icon').classList.remove('hidden');
      document.getElementById('cover-text').classList.remove('hidden');
      document.getElementById('cover-input').value = '';
    }

    // ── DELETE BOOK ───────────────────────────────────────
    function deleteBook(id) {
      books = books.filter(b => b.id !== id);
      localStorage.setItem('ami-books', JSON.stringify(books));
      renderBooks();
    }

    // ── FILTER ────────────────────────────────────────────
    function filterBooks(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const isActive = btn.dataset.filter === filter;
        btn.classList.toggle('active-filter', isActive);
        btn.classList.toggle('bg-primary', isActive);
        btn.classList.toggle('text-white', isActive);
        btn.classList.toggle('border-primary', isActive);
        btn.classList.toggle('text-on-surface-variant', !isActive);
        btn.classList.toggle('border-outline-variant', !isActive);
      });
      renderBooks();
    }

    // ── RENDER BOOKS ──────────────────────────────────────
    function renderBooks() {
      const grid = document.getElementById('books-grid');
      const emptyState = document.getElementById('empty-state');
      const filtered = currentFilter === 'all' ? books : books.filter(b => b.status === currentFilter);

      if (filtered.length === 0) {
        grid.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      grid.innerHTML = filtered.map(book => `
        <div class="bg-surface-container-lowest p-gutter rounded-xl editorial-card flex gap-gutter border border-outline-variant/20 h-full relative">

          <!-- Delete button -->
          <button onclick="deleteBook(${book.id})" class="absolute top-3 right-3 text-on-surface-variant hover:text-error transition-colors p-1 rounded-full hover:bg-surface-container" title="Remove">
            <span class="material-symbols-outlined text-[18px]">close</span>
          </button>

          <!-- Cover -->
          ${book.coverSrc
            ? `<div class="w-32 md:w-40 h-48 md:h-56 flex-shrink-0 bg-surface-variant rounded-md overflow-hidden shadow-sm">
                <img class="w-full h-full object-cover" src="${book.coverSrc}" alt="${book.title} cover"/>
               </div>`
            : `<div class="w-32 md:w-40 h-48 md:h-56 flex-shrink-0 bg-surface-container rounded-md flex items-center justify-center text-4xl">📖</div>`
          }

          <!-- Info -->
          <div class="flex flex-col justify-between py-1 pr-6">
            <div>
              ${book.genre ? `<span class="font-label-sm text-label-sm text-on-secondary-container bg-secondary-container px-2 py-0.5 rounded-full mb-2 inline-block">${book.genre}</span>` : ''}
              <h4 class="font-headline-md text-headline-md text-on-surface leading-tight mb-1">${book.title}</h4>
              ${book.author ? `<p class="font-body-md text-on-surface-variant opacity-80 mb-stack-md">${book.author}</p>` : ''}
              ${book.notes ? `<p class="font-body-md text-on-surface-variant line-clamp-3 text-sm italic">"${book.notes}"</p>` : ''}
            </div>
            <div class="flex items-center gap-gutter mt-2 flex-wrap">
              ${book.rating ? `<div class="flex items-center text-primary gap-1">
                <span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1;">star</span>
                <span class="font-label-sm">${book.rating}</span>
              </div>` : ''}
              ${book.rating && (book.status || book.date) ? `<span class="text-outline-variant">|</span>` : ''}
              <span class="font-label-sm text-on-surface-variant">${book.status}${book.date ? ' · ' + new Date(book.date).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'}) : ''}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ── INIT ──────────────────────────────────────────────
    renderBooks();
  </script>

</body>
</html>
